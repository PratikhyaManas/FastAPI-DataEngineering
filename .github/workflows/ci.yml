name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test-lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: SAST (Bandit)
        run: |
          pip install bandit
          bandit -r app -f txt -lll

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./pipeline_ci.db
          PIPELINE_API_KEY: change-me
        run: |
          pytest -q

      - name: Build Docker image
        run: |
          docker build -t fastapi-de-pipeline:ci .
